name: Deploy VitePress to CentOS

on:
  push:
    branches:
      - main
      - vp
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SITE_BASE: /
      SITE_URL: ${{ vars.SITE_URL }}
      DEPLOY_PATH: /var/www/maayuan-docs
      TMP_DEPLOY_PATH: /tmp/maayuan-docs_tmp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VitePress application
        env:
          SITE_BASE: ${{ env.SITE_BASE }}
          SITE_URL: ${{ env.SITE_URL }}
        run: pnpm run docs:build

      - name: Upload new version to tmp folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: .vitepress/dist/*
          target: ${{ env.TMP_DEPLOY_PATH }}/
          overwrite: true
          strip_components: 2

      - name: Atomically switch release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            sudo mkdir -p "$(dirname '${{ env.DEPLOY_PATH }}')"
            sudo rm -rf "${{ env.DEPLOY_PATH }}_old"
            sudo mv "${{ env.DEPLOY_PATH }}" "${{ env.DEPLOY_PATH }}_old" || true
            sudo mv "${{ env.TMP_DEPLOY_PATH }}" "${{ env.DEPLOY_PATH }}"
            sudo rm -rf "${{ env.DEPLOY_PATH }}_old"
            echo "✅ Switched to new version successfully"
